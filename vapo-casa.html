<style>
  :root {
    --blue:       #1A3A5C;
    --blue-mid:   #2E6DA4;
    --blue-light: #5B9BD5;
    --blue-pale:  #D6E8F7;
    --sand:       #F4F8FC;
    --charcoal:   #1B2021;
    --muted:      #6B7E8F;
    --white:      #FFFFFF;
    --l1:  #C0392B;
    --l2:  #E67E22;
    --l5a: #16A085;
    --l5b: #27AE60;
    --l6:  #8E44AD;
    --l10: #2980B9;
    --lido: #2D6A4F;
    --roma: #7B3FA0;
    --radius: 16px;
    --safe-top:   env(safe-area-inset-top, 0px);
    --safe-bottom:env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--sand); color: var(--charcoal);
    min-height: 100vh; padding-bottom: calc(20px + var(--safe-bottom));
  }
  header {
    background: var(--blue);
    padding: calc(var(--safe-top) + 18px) 20px 18px;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .header-left h1 { font-size: 24px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; line-height: 1; }
  .header-left .subtitle { font-size: 12px; color: var(--blue-pale); margin-top: 4px; }
  .time-display .now { font-size: 28px; font-weight: 600; color: var(--white); font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .time-display .date { font-size: 11px; color: var(--blue-light); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.8px; text-align: right; }

  .stop-toggle {
    margin: 14px 20px 0; display: flex; background: #0f2640;
    border-radius: 12px; padding: 4px; gap: 4px;
  }
  .stop-btn {
    flex: 1; padding: 9px 4px; border: none; border-radius: 9px;
    font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    background: transparent; color: rgba(255,255,255,0.45); text-align: center;
  }
  .stop-btn.active { background: var(--white); color: var(--blue); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

  .dir-toggle {
    margin: 10px 20px 0; display: flex; background: #D6E8F7;
    border-radius: 10px; padding: 3px; gap: 3px;
  }
  .dir-btn {
    flex: 1; padding: 8px 4px; border: none; border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    background: transparent; color: var(--muted); text-align: center; line-height: 1.2;
  }
  .dir-btn.active { background: var(--white); color: var(--blue); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
  /* Zattere : direction Lido uniquement pour L10 → masquer toggle Roma */
  .dir-lido-only .dir-btn[data-dir="roma"] { opacity: 0.35; pointer-events: none; }

  .section-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    letter-spacing: 1.2px; text-transform: uppercase; padding: 16px 20px 8px;
  }
  .departures { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--white); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 0 12px; align-items: center; position: relative; overflow: hidden;
  }
  .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
  .card.cl1::before  { background: var(--l1); }
  .card.cl2::before  { background: var(--l2); }
  .card.cl51::before { background: var(--l5a); }
  .card.cl52::before { background: var(--l5b); }
  .card.cl6::before  { background: var(--l6); }
  .card.cl10::before { background: var(--l10); }
  .card.next { border: 1.5px solid var(--blue-light); }

  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 42px; height: 42px; border-radius: 10px;
    font-size: 12px; font-weight: 800; text-align: center; line-height: 1.1;
  }
  .card.cl1  .badge { background: #FDECEA; color: var(--l1); }
  .card.cl2  .badge { background: #FEF0E6; color: var(--l2); }
  .card.cl51 .badge { background: #D5F0EB; color: var(--l5a); }
  .card.cl52 .badge { background: #D5F5E3; color: var(--l5b); }
  .card.cl6  .badge { background: #F0E6F8; color: var(--l6); }
  .card.cl10 .badge { background: #D6EAF8; color: var(--l10); }

  .card-middle { display:flex; flex-direction:column; gap:2px; }
  .depart-time { font-size:22px; font-weight:700; color:var(--charcoal); font-variant-numeric:tabular-nums; letter-spacing:-0.5px; line-height:1; }
  .dest-chip {
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; font-weight:700; margin-top:3px;
    padding:2px 8px; border-radius:20px; width:fit-content;
  }
  .dest-chip.lido { background:#D8F3DC; color:#2D6A4F; }
  .dest-chip.roma { background:#EDE0F5; color:#7B3FA0; }
  .route-info { font-size:11px; color:var(--muted); margin-top:2px; }

  .card-right { text-align:right; }
  .countdown-big {
    font-size:19px; font-weight:700; color:var(--blue-mid);
    font-variant-numeric:tabular-nums; margin-top:3px; letter-spacing:-0.3px;
  }
  .countdown-big.imminent { color:var(--l1); }
  .countdown { font-size:11px; color:var(--muted); margin-top:2px; }
  .countdown.imminent { color:var(--l1); font-weight:600; }

  .next-tag {
    position:absolute; top:9px; right:11px;
    font-size:9px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
    color:var(--blue); background:var(--blue-pale); padding:2px 6px; border-radius:4px;
  }
  .no-service { text-align:center; padding:40px 20px; color:var(--muted); font-size:15px; }
  .no-service .icon { font-size:40px; margin-bottom:10px; }

  .info-box {
    margin:14px 20px 0; background:var(--blue-pale);
    border-radius:12px; padding:12px 14px;
    font-size:12px; color:var(--blue); line-height:1.6;
  }
  .info-box strong { font-weight:700; }
  .refresh-btn {
    display:block; margin:14px 20px 0; width:calc(100% - 40px);
    padding:14px; background:var(--blue); color:white; border:none;
    border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;
  }
  .refresh-btn:active { opacity:0.85; }
  .divider { height:1px; background:#D6E8F7; margin:14px 20px; }
  .legend { margin:0 20px 20px; display:flex; flex-direction:column; gap:6px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); line-height:1.3; }
  .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .note-feriale { font-size:10px; color:var(--muted); text-align:center; margin:6px 20px 0; font-style:italic; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>⚓ Vaporetto</h1>
    <div class="subtitle" id="header-subtitle">Prochains départs</div>
  </div>
  <div class="time-display">
    <div class="now" id="clock">--:--</div>
    <div class="date" id="dateLabel">--</div>
  </div>
</header>

<div class="stop-toggle">
  <button class="stop-btn active" id="btn-rezzonico" onclick="setStop('rezzonico')">Ca' Rezzonico</button>
  <button class="stop-btn" id="btn-accademia"  onclick="setStop('accademia')">Accademia</button>
  <button class="stop-btn" id="btn-zattere"    onclick="setStop('zattere')">Zattere</button>
</div>

<div class="dir-toggle" id="dir-toggle">
  <button class="dir-btn" id="btn-roma" data-dir="roma" onclick="setDir('roma')">🟣 → P.le Roma</button>
  <button class="dir-btn active" id="btn-lido" data-dir="lido" onclick="setDir('lido')">🟢 → Lido S.M.E.</button>
</div>

<div id="departures-container"></div>
<button class="refresh-btn" onclick="render()">↻ Actualiser</button>
<div class="divider"></div>
<div class="legend" id="legend-box"></div>

<script>
// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function toMin(s){const[h,m]=s.split(':').map(Number);return h*60+m;}
function minToStr(m){m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function getNowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function getJourLabel(){
  const d=new Date();
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months=['jan','fév','mar','avr','mai','juin','jul','aoû','sep','oct','nov','déc'];
  return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()];
}
function isFeriale(){const d=new Date().getDay();return d>=1&&d<=5;}

// ═══════════════════════════════════════════════════
// DONNÉES LIGNE 1
// Ca'Rezzonico → Lido : :06 :18 :30 :42 :54 (toutes 12min)
// Ca'Rezzonico → Roma : :05 :17 :29 :41 :53
// Accademia = Ca'Rez +2min (→Lido) / -3min (→Roma)
// ═══════════════════════════════════════════════════

const L1_CAR_LIDO=[], L1_ACC_LIDO=[], L1_CAR_ROMA=[], L1_ACC_ROMA=[];
(function(){
  // → Lido
  const deps_lido=["05:30","05:50","06:10","06:30","06:40","06:54"];
  let t=toMin("07:06"); while(t<=toMin("21:46")){deps_lido.push(minToStr(t));t+=12;}
  deps_lido.forEach(d=>{
    L1_CAR_LIDO.push({dep:toMin(d),arr:toMin(d)+44,line:1,key:'cl1'});
    L1_ACC_LIDO.push({dep:toMin(d)+2,arr:toMin(d)+46,line:1,key:'cl1'});
  });
  // → Roma
  const deps_roma=["05:05","05:25","05:45","06:05","06:25","06:39"];
  let t2=toMin("06:51"); while(t2<=toMin("21:27")){deps_roma.push(minToStr(t2));t2+=12;}
  deps_roma.forEach(d=>{
    L1_CAR_ROMA.push({dep:toMin(d),arr:toMin(d)+18,line:1,key:'cl1'});
    L1_ACC_ROMA.push({dep:toMin(d)-3,arr:toMin(d)+15,line:1,key:'cl1'});
  });
})();

// ═══════════════════════════════════════════════════
// DONNÉES LIGNE 2 — Accademia uniquement
// ═══════════════════════════════════════════════════

const L2_ACC_LIDO=[], L2_ACC_ROMA=[];
(function(){
  let t=toMin("08:34"); while(t<=toMin("18:58")){L2_ACC_LIDO.push({dep:t,arr:t+24,line:2,key:'cl2'});t+=30;}
  let t2=toMin("09:24"); while(t2<=toMin("19:24")){L2_ACC_ROMA.push({dep:t2,arr:t2+28,line:2,key:'cl2'});t2+=30;}
})();

// ═══════════════════════════════════════════════════
// DONNÉES ZATTERE — panneaux photos (30.05.2026)
// Approdo B → S.Marco/S.Zaccaria/Lido : L2, L5.1, L6, L10
// Approdo A → P.le Roma/Ferrovia       : L2, L5.2, L6
// ═══════════════════════════════════════════════════

const ZAT_L6_LIDO=[], ZAT_L6_ROMA=[];
const ZAT_L51_LIDO=[];
const ZAT_L52_ROMA=[];
const ZAT_L2_LIDO=[], ZAT_L2_ROMA=[];
const ZAT_L10_LIDO=[];

(function(){

  // ══ PANNEAU B ══════════════════════════════════════

  // L2 Approdo B → S.Marco · S.Zaccaria (arr +24min)
  // Panneau B : 06:04 06:16 06:26 06:28 06:40 06:46 06:52
  // puis ai minuti :04 :16 :28 :40 :52 (toutes 12min) de 07:04 à 23:52
  // derniers : 00:04 00:10
  const L2B=["06:04","06:16","06:26","06:28","06:40","06:46","06:52"];
  let tL2b=toMin("07:04"); while(tL2b<=toMin("23:52")){L2B.push(minToStr(tL2b));tL2b+=12;}
  L2B.push("00:04","00:10");
  L2B.forEach(d=>ZAT_L2_LIDO.push({dep:toMin(d),arr:toMin(d)+24,line:2,key:'cl2',dest:'S.Marco · S.Zaccaria'}));

  // L5.1 Approdo B → S.Zaccaria · Lido S.M.E. (arr +28min)
  // Panneau B : 00:01 / 05:11 / 05:28 05:31 05:51
  // puis :01 :21 :41 toutes 20min de 06:01 à 21:41
  // + :11 :31 :51 en début de service matin
  const L51=["00:01","05:11","05:28","05:31","05:51",
             "06:01","06:21","06:41","07:01","07:21","07:41"];
  let tL51=toMin("08:01"); while(tL51<=toMin("21:41")){L51.push(minToStr(tL51));tL51+=20;}
  const L51u=[...new Set(L51)].sort((a,b)=>toMin(a)-toMin(b));
  L51u.forEach(d=>ZAT_L51_LIDO.push({dep:toMin(d),arr:toMin(d)+28,line:'5.1',key:'cl51',dest:'S.Zaccaria · Lido S.M.E.'}));

  // L6 Approdo B → Lido S.M.E. (feriale, arr +19min)
  // Panneau B : *13 *33 *53 dès 06:13, puis :13 :33 :53 toutes 20min jusqu'à 20:53
  let tL6b=toMin("06:13"); while(tL6b<=toMin("20:53")){
    ZAT_L6_LIDO.push({dep:tL6b,arr:tL6b+19,line:6,key:'cl6',dest:'Lido S.M.E.',feriale:true});
    tL6b+=20;
  }

  // L10 Approdo B → Lido S.M.E. (feriale, arr +18min)
  // Panneau B : 07:34 et 08:34 uniquement
  ["07:34","08:34"].forEach(d=>
    ZAT_L10_LIDO.push({dep:toMin(d),arr:toMin(d)+18,line:10,key:'cl10',dest:'Lido S.M.E.',feriale:true})
  );

  // ══ PANNEAU A ══════════════════════════════════════

  // L2 Approdo A → Tronchetto · P.le Roma · Ferrovia (arr +14min)
  // Panneau A : 05:05 05:10 puis matin irrégulier
  // ai minuti :05 :17 :29 :41 :53 (toutes 12min) de 06:05 à 23:53
  // + :10 :17 :29 :30 :41 :50 en début matin
  // derniers : *11 *11 puis 00:11
  const L2A=["05:05","05:10","05:29","05:41","05:50","05:53",
             "06:05","06:10","06:17","06:29","06:30","06:41","06:50","06:53"];
  let tL2a=toMin("07:05"); while(tL2a<=toMin("23:53")){L2A.push(minToStr(tL2a));tL2a+=12;}
  L2A.push("00:11");
  const L2Au=[...new Set(L2A)].sort((a,b)=>toMin(a)-toMin(b));
  L2Au.forEach(d=>ZAT_L2_ROMA.push({dep:toMin(d),arr:toMin(d)+14,line:2,key:'cl2',dest:'Tronchetto · P.le Roma · Ferrovia'}));

  // L5.2 Approdo A → P.le Roma · Ferrovia (arr +14min)
  // Panneau A : :12 :32 :52 toutes les 20min de 06:12 à 20:52
  // ** = opérateur tiers, même horaire
  // fins soirée : 21:22 21:42
  const L52=[];
  let tL52=toMin("06:12"); while(tL52<=toMin("20:52")){L52.push(minToStr(tL52));tL52+=20;}
  L52.push("21:22","21:42");
  L52.forEach(d=>ZAT_L52_ROMA.push({dep:toMin(d),arr:toMin(d)+14,line:'5.2',key:'cl52',dest:'P.le Roma · Ferrovia'}));

  // L6 Approdo A → P.le Roma (feriale, arr +13min)
  // Panneau A : *00 *20 *40 puis :00 :20 :40 de 07:00 à 20:40
  let tL6a=toMin("07:00"); while(tL6a<=toMin("20:40")){
    ZAT_L6_ROMA.push({dep:tL6a,arr:tL6a+13,line:6,key:'cl6',dest:'P.le Roma',feriale:true});
    tL6a+=20;
  }

})();

// ═══════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════
let stopMode='rezzonico', dirMode='lido';

// Restaurer le dernier onglet utilisé
(function(){
  try {
    const s=localStorage.getItem('vapo_stop');
    const d=localStorage.getItem('vapo_dir');
    if(s) stopMode=s;
    if(d) dirMode=d;
  } catch(e){}
})();

function setStop(s){
  stopMode=s;
  try{localStorage.setItem('vapo_stop',s);}catch(e){}
  document.querySelectorAll('.stop-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+s).classList.add('active');
  render();
}
function setDir(d){
  dirMode=d;
  try{localStorage.setItem('vapo_dir',d);}catch(e){}
  document.querySelectorAll('.dir-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+d).classList.add('active');
  render();
}

// ═══════════════════════════════════════════════════
// LOGIQUE
// ═══════════════════════════════════════════════════
function getNext(list,nowMin,count){
  const ok=list.filter(e=>!e.feriale||isFeriale());
  return ok.map(e=>{let diff=e.dep-nowMin;if(diff<0)diff+=1440;return{...e,diff};})
    .sort((a,b)=>a.diff-b.diff).slice(0,count);
}

// ═══════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════
const STOP_LABELS={rezzonico:"Ca' Rezzonico",accademia:"Accademia",zattere:"Zattere"};
const LINE_LABELS={
  1:'Linea 1 · Grand Canal complet',
  2:'Linea 2 · Via Giudecca – Tronchetto',
  '5.1':'Linea 5.1 · Via Ospedale / F.te Nove',
  '5.2':'Linea 5.2 · Via F.te Nove / Ospedale',
  6:'Linea 6 · Via Zattere direct',
  10:'Linea 10 · Feriale uniquement'
};
const LEGEND_ZATTERE_LIDO=[
  {key:'cl2',  txt:'Linea 2 · → S.Marco · S.Zaccaria (via Giudecca)'},
  {key:'cl51', txt:'Linea 5.1 · → S.Zaccaria · Lido S.M.E.'},
  {key:'cl6',  txt:'Linea 6 · → Lido S.M.E. (feriale lun–ven)'},
  {key:'cl10', txt:'Linea 10 · → Lido S.M.E. (feriale lun–ven)'},
];
const LEGEND_ZATTERE_ROMA=[
  {key:'cl2',  txt:'Linea 2 · → Tronchetto · P.le Roma · Ferrovia'},
  {key:'cl52', txt:'Linea 5.2 · → P.le Roma · Ferrovia'},
  {key:'cl6',  txt:'Linea 6 · → P.le Roma (feriale lun–ven)'},
];
const LINE_COLORS={cl1:'var(--l1)',cl2:'var(--l2)',cl51:'var(--l5a)',cl52:'var(--l5b)',cl6:'var(--l6)',cl10:'var(--l10)'};

function render(){
  const nowMin=getNowMin();
  const stopLabel=STOP_LABELS[stopMode];
  let dirLabel;
  if(stopMode==='zattere'){
    dirLabel=dirMode==='lido'?'Approdo B → Lido':'Approdo A → P.le Roma';
  } else {
    dirLabel=dirMode==='lido'?'→ Lido S.M.E.':'→ P.le Roma';
  }
  document.getElementById('header-subtitle').textContent=stopLabel+' · '+dirLabel;

  const dirToggle=document.getElementById('dir-toggle');
  if(stopMode==='zattere'){
    document.getElementById('btn-roma').textContent='🟣 Approdo A → P.le Roma';
    document.getElementById('btn-lido').textContent='🟢 Approdo B → Lido';
  } else {
    document.getElementById('btn-roma').textContent='🟣 → P.le Roma';
    document.getElementById('btn-lido').textContent='🟢 → Lido S.M.E.';
  }
  let schedules=[];
  if(stopMode==='rezzonico'){
    schedules=dirMode==='lido'?L1_CAR_LIDO:L1_CAR_ROMA;
  } else if(stopMode==='accademia'){
    const l1=dirMode==='lido'?L1_ACC_LIDO:L1_ACC_ROMA;
    const l2=dirMode==='lido'?L2_ACC_LIDO:L2_ACC_ROMA;
    schedules=[...l1,...l2];
  } else { // zattere
    if(dirMode==='lido'){
      // Approdo B → Lido/S.Zaccaria : L2, L5.1, L6, L10
      schedules=[...ZAT_L2_LIDO,...ZAT_L51_LIDO,...ZAT_L6_LIDO,...ZAT_L10_LIDO];
    } else {
      // Approdo A → P.le Roma : L2, L5.2, L6
      schedules=[...ZAT_L2_ROMA,...ZAT_L52_ROMA,...ZAT_L6_ROMA];
    }
  }

  // Grouper par ligne pour getNext, puis fusionner top 3 global
  const lineKeys=[...new Set(schedules.map(e=>e.key))];
  const candidates=lineKeys.flatMap(k=>getNext(schedules.filter(e=>e.key===k),nowMin,3));
  const top3=candidates.sort((a,b)=>a.diff-b.diff).slice(0,3);

  const container=document.getElementById('departures-container');
  if(!top3.length){
    container.innerHTML='<div class="no-service"><div class="icon">🌙</div>Pas de service pour le moment</div>';
    return;
  }

  const dirChipClass=dirMode==='lido'?'lido':'roma';
  const dirChipLabel=dirMode==='lido'?'🟢 Lido S.M.E.':'🟣 P.le Roma';

  let html='<div class="section-label">Prochains départs — '+stopLabel+'</div><div class="departures">';
  top3.forEach((trip,i)=>{
    const isNext=i===0;
    const depStr=minToStr(trip.dep);
    const arrStr=minToStr(trip.arr);
    const lineNum=typeof trip.line==='number'?trip.line:trip.line;
    const routeInfo='Linea '+lineNum+' · '+(trip.dest||LINE_LABELS[lineNum]||'');

    let countdownHtml;
    if(isNext){
      countdownHtml='<div class="countdown-big" id="countdown-next"></div>';
      window._nextDepMin=trip.dep;
    } else {
      const m=trip.diff;
      let txt='',cls='countdown';
      if(m<=5){txt='dans '+m+' min';cls='countdown imminent';}
      else if(m<60){txt='dans '+m+' min';}
      else{const h=Math.floor(m/60),mn=m%60;txt=mn>0?'dans '+h+'h'+String(mn).padStart(2,'0'):'dans '+h+'h';}
      countdownHtml='<div class="'+cls+'">'+txt+'</div>';
    }

    // Chip destination : couleur selon terminus réel
    const chipDest = trip.dest || (dirMode==='lido' ? 'Lido S.M.E.' : 'P.le Roma');
    const isLidoDest = chipDest.toLowerCase().includes('lido') || chipDest.toLowerCase().includes('s.zaccaria') || chipDest.toLowerCase().includes('zaccaria');
    const chipClass = isLidoDest ? 'lido' : 'roma';
    const chipEmoji = isLidoDest ? '🟢' : '🟣';

    const badgeText=typeof trip.line==='string'?trip.line:'L'+trip.line;
    html+='\n<div class="card '+trip.key+(isNext?' next':'')+'">'+
      (isNext?'<div class="next-tag">PROCHAIN</div>':'')+
      '<div class="badge">'+badgeText+'</div>'+
      '<div class="card-middle">'+
        '<div class="depart-time">'+depStr+'</div>'+
        '<div class="dest-chip '+chipClass+'">'+chipEmoji+' '+chipDest+'</div>'+
        '<div class="route-info">'+routeInfo+' · arr. '+arrStr+'</div>'+
      '</div>'+
      '<div class="card-right">'+countdownHtml+'</div>'+
    '</div>';
  });
  html+='</div>';

  // Note feriale pour L10
  const hasL10=top3.some(t=>t.line===10);
  if(hasL10) html+='<div class="note-feriale">⚠ Linea 10 : feriale (lun–ven) uniquement</div>';

  // Info box — uniquement pour Ca'Rezzonico et Accademia
  if(stopMode!=='zattere'){
    html+='<div class="info-box"><strong>⚓ '+stopLabel+'</strong> '+dirLabel+'<br>Arrivée <strong>'+(dirMode==='lido'?'Lido S.M.E.':'P.le Roma')+'</strong></div>';
  }
  container.innerHTML=html;

  // Légende
  const legendBox=document.getElementById('legend-box');
  let legendHtml='';
  if(stopMode==='rezzonico'){
    legendHtml='<div class="legend-item"><div class="legend-dot" style="background:var(--l1)"></div>Linea 1 · Piazzale Roma – Lido S.M.E. e ritorno</div>';
  } else if(stopMode==='accademia'){
    legendHtml=
      '<div class="legend-item"><div class="legend-dot" style="background:var(--l1)"></div>Linea 1 · Piazzale Roma – Lido S.M.E. e ritorno</div>'+
      '<div class="legend-item"><div class="legend-dot" style="background:var(--l2)"></div>Linea 2 · P.le Roma – Ferrovia – Rialto – S.Tomà – S.Zaccaria – Lido S.M.E. e ritorno</div>';
  } else {
    const leg=dirMode==='lido'?LEGEND_ZATTERE_LIDO:LEGEND_ZATTERE_ROMA;
    leg.forEach(l=>{
      legendHtml+='<div class="legend-item"><div class="legend-dot" style="background:'+LINE_COLORS[l.key]+'"></div>'+l.txt+'</div>';
    });
  }
  legendBox.innerHTML=legendHtml;
}

// ═══════════════════════════════════════════════════
// HORLOGE & COUNTDOWN
// ═══════════════════════════════════════════════════
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('dateLabel').textContent=getJourLabel();
}
function updateCountdown(){
  const el=document.getElementById('countdown-next');
  if(!el||window._nextDepMin===undefined) return;
  const n=new Date();
  const nowSec=n.getHours()*3600+n.getMinutes()*60+n.getSeconds();
  let diff=window._nextDepMin*60-nowSec;
  if(diff<0) diff+=86400;
  if(diff>7200){render();return;}
  if(diff<=0){el.textContent='En route!';el.className='countdown-big imminent';setTimeout(render,5000);return;}
  const mm=Math.floor(diff/60),ss=diff%60;
  let txt,cls='countdown-big';
  if(diff<60){txt=ss+'s';cls+=' imminent';}
  else if(diff<300){txt=mm+'m '+String(ss).padStart(2,'0')+'s';cls+=' imminent';}
  else{txt=mm+'m '+String(ss).padStart(2,'0')+'s';}
  el.textContent=txt;el.className=cls;
}
updateClock();
// Initialiser les boutons selon l'état restauré
document.getElementById('btn-'+stopMode).classList.add('active');
document.querySelectorAll('.stop-btn').forEach(b=>{ if(b.id!=='btn-'+stopMode) b.classList.remove('active'); });
document.getElementById('btn-'+dirMode).classList.add('active');
document.querySelectorAll('.dir-btn').forEach(b=>{ if(b.id!=='btn-'+dirMode) b.classList.remove('active'); });
render(); updateCountdown();
setInterval(()=>{updateClock();updateCountdown();},1000);
setInterval(render,30000);
</script>
</body>
</html>
