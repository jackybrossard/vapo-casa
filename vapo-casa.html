<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vaporetto">
<title>Vaporetto</title>
<style>
  :root {
    --blue:       #1A3A5C;
    --blue-mid:   #2E6DA4;
    --blue-light: #5B9BD5;
    --blue-pale:  #D6E8F7;
    --sand:       #F4F8FC;
    --charcoal:   #1B2021;
    --muted:      #6B7E8F;
    --white:      #FFFFFF;
    --l1:         #C0392B;
    --l2:         #E67E22;
    --lido:       #2D6A4F;
    --roma:       #7B3FA0;
    --radius:     16px;
    --safe-top:   env(safe-area-inset-top, 0px);
    --safe-bottom:env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--sand);
    color: var(--charcoal);
    min-height: 100vh;
    padding-bottom: calc(20px + var(--safe-bottom));
  }

  header {
    background: var(--blue);
    padding: calc(var(--safe-top) + 18px) 20px 18px;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .header-left h1 { font-size: 24px; font-weight: 700; color: var(--white); letter-spacing: -0.5px; line-height: 1; }
  .header-left .subtitle { font-size: 12px; color: var(--blue-pale); margin-top: 4px; }
  .time-display .now { font-size: 28px; font-weight: 600; color: var(--white); font-variant-numeric: tabular-nums; letter-spacing: -1px; }
  .time-display .date { font-size: 11px; color: var(--blue-light); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.8px; text-align: right; }

  /* Arrêt toggle */
  .stop-toggle {
    margin: 14px 20px 0;
    display: flex; background: #0f2640; border-radius: 12px; padding: 4px; gap: 4px;
  }
  .stop-btn {
    flex: 1; padding: 10px 0; border: none; border-radius: 9px;
    font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    background: transparent; color: rgba(255,255,255,0.45);
  }
  .stop-btn.active { background: var(--white); color: var(--blue); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

  /* Direction toggle */
  .dir-toggle {
    margin: 10px 20px 0;
    display: flex; background: #D6E8F7; border-radius: 10px; padding: 3px; gap: 3px;
  }
  .dir-btn {
    flex: 1; padding: 8px 4px; border: none; border-radius: 8px;
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    background: transparent; color: var(--muted); text-align: center; line-height: 1.2;
  }
  .dir-btn.active { background: var(--white); color: var(--blue); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

  .section-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    letter-spacing: 1.2px; text-transform: uppercase; padding: 16px 20px 8px;
  }
  .departures { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--white); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 0 12px; align-items: center; position: relative; overflow: hidden;
  }
  .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .card.l1::before { background: var(--l1); }
  .card.l2::before { background: var(--l2); }
  .card.next { border: 1.5px solid var(--blue-light); }

  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 42px; height: 42px; border-radius: 10px;
    font-size: 14px; font-weight: 800;
  }
  .card.l1 .badge { background: #FDECEA; color: var(--l1); }
  .card.l2 .badge { background: #FEF0E6; color: var(--l2); }

  .card-middle { display: flex; flex-direction: column; gap: 2px; }
  .depart-time { font-size: 22px; font-weight: 700; color: var(--charcoal); font-variant-numeric: tabular-nums; letter-spacing: -0.5px; line-height: 1; }
  .dest-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700; margin-top: 3px;
    padding: 2px 8px; border-radius: 20px; width: fit-content;
  }
  .dest-chip.lido  { background: #D8F3DC; color: #2D6A4F; }
  .dest-chip.roma  { background: #EDE0F5; color: #7B3FA0; }
  .route-info { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .card-right { text-align: right; }
  .arr-time { font-size: 16px; font-weight: 600; color: var(--blue-mid); font-variant-numeric: tabular-nums; }

  .countdown-big {
    font-size: 19px; font-weight: 700; color: var(--blue-mid);
    font-variant-numeric: tabular-nums; margin-top: 3px; letter-spacing: -0.3px;
  }
  .countdown-big.imminent { color: var(--l1); }
  .countdown { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .countdown.imminent { color: var(--l1); font-weight: 600; }

  .next-tag {
    position: absolute; top: 9px; right: 11px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--blue); background: var(--blue-pale); padding: 2px 6px; border-radius: 4px;
  }
  .no-service { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px; }
  .no-service .icon { font-size: 40px; margin-bottom: 10px; }

  .info-box {
    margin: 14px 20px 0; background: var(--blue-pale);
    border-radius: 12px; padding: 12px 14px;
    font-size: 12px; color: var(--blue); line-height: 1.6;
  }
  .info-box strong { font-weight: 700; }

  .refresh-btn {
    display: block; margin: 14px 20px 0; width: calc(100% - 40px);
    padding: 14px; background: var(--blue); color: white; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
  }
  .refresh-btn:active { opacity: 0.85; }

  .divider { height: 1px; background: #D6E8F7; margin: 14px 20px; }
  .legend { margin: 0 20px 20px; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>⚓ Vaporetto</h1>
    <div class="subtitle" id="header-subtitle">Prochains départs</div>
  </div>
  <div class="time-display">
    <div class="now" id="clock">--:--</div>
    <div class="date" id="dateLabel">--</div>
  </div>
</header>

<!-- Arrêt -->
<div class="stop-toggle">
  <button class="stop-btn active" id="btn-rezzonico" onclick="setStop('rezzonico')">Ca' Rezzonico</button>
  <button class="stop-btn" id="btn-accademia" onclick="setStop('accademia')">Accademia</button>
</div>

<!-- Direction -->
<div class="dir-toggle">
  <button class="dir-btn active" id="btn-lido" onclick="setDir('lido')">🟢 → Lido S.M.E.</button>
  <button class="dir-btn" id="btn-roma" onclick="setDir('roma')">🟣 → P.le Roma</button>
</div>

<div id="departures-container"></div>
<button class="refresh-btn" onclick="render()">↻ Actualiser</button>
<div class="divider"></div>
<div class="legend" id="legend-box"></div>

<script>
// ═══════════════════════════════════════════════════
// DONNÉES — Ligne 1 — horaires "ai minuti" = toutes les 12 min
// Ca' Rezzonico (CAR) et Accademia (ACC)
// Sens → Lido : arrêts dans l'ordre Roma→Lido
// Sens → Roma : arrêts dans l'ordre Lido→Roma
//
// Du PDF Ligne 1 (en vigueur 30 mai 2026) :
// → Lido : départs SME à :02 :14 :26 :38 :50 de 07:26 à 20:50
//   Ca' Rezzonico "A" (aller vers Lido) = SME - environ 44min
//   Accademia "A"    (aller vers Lido) = SME - environ 42min
//
// → Roma : départs SME à :08 :20 :32 :44 :56 de 04:36 à 20:44
//   Ca' Rezzonico "B" (retour vers Roma) = SME + environ 39min  
//   Accademia "B"    (retour vers Roma) = SME + environ 37min
//
// Arrivée finale :
//   → Lido : LIDO SME
//   → Roma : P.LE ROMA
//
// Ligne 1 → Lido : Ca'Rezzonico passage aux minutes :06 :18 :30 :42 :54
// Ligne 1 → Roma : Ca'Rezzonico passage aux minutes :05 :17 :29 :41 :53
//
// Je lis les heures EXACTES du PDF pour chaque arrêt :
// ═══════════════════════════════════════════════════

function toMin(s) { const [h,m]=s.split(':').map(Number); return h*60+m; }
function minToStr(m) { m=((m%1440)+1440)%1440; return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; }
function getNowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function getJourLabel() {
  const d=new Date();
  const days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months=['jan','fév','mar','avr','mai','juin','jul','aoû','sep','oct','nov','déc'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

// ─── LIGNE 1 — Ca' Rezzonico vers LIDO ───────────────
// PDF : Ca' Rezzonico "A" aller Lido
// Départs réguliers toutes les 12min
// Premiers départs du matin (irréguliers) puis "ai minuti" :06 :18 :30 :42 :54
// Arrivée Lido SME = +44min environ

const L1_CAR_LIDO = []; // généré ci-dessous
const L1_ACC_LIDO = []; // généré ci-dessous
const L1_CAR_ROMA = [];
const L1_ACC_ROMA = [];

// Du PDF ligne 1 vers Lido :
// Ca'Rezzonico : 05:30 05:50 06:10 06:30 06:40 06:54 puis toutes les 12min :06 :18 :30 :42 :54
// jusqu'à 21:46
// Accademia    : 05:32 05:52 06:12 06:32 06:42 06:56 puis :08 :20 :32 :44 :56

(function() {
  // Départs Ca'Rezzonico vers Lido (heure exacte + arrivée Lido SME = +44min)
  const car_lido_departs = [
    "05:30","05:50","06:10","06:30","06:40","06:54",
  ];
  // puis toutes les 12min de 07:06 à 21:46
  let t = toMin("07:06");
  while (t <= toMin("21:46")) { car_lido_departs.push(minToStr(t)); t += 12; }

  car_lido_departs.forEach(dep => {
    L1_CAR_LIDO.push({ dep: toMin(dep), arr: toMin(dep)+44, line: 1 });
  });

  // Accademia vers Lido = Ca'Rezzonico + 2min
  car_lido_departs.forEach(dep => {
    L1_ACC_LIDO.push({ dep: toMin(dep)+2, arr: toMin(dep)+46, line: 1 });
  });

  // Départs Ca'Rezzonico vers Roma
  // PDF : SME départ :08 :20 :32 :44 :56 → Ca'Rez = SME+39min → départ Ca'Rez :47 :59 :11 :23 :35
  // Premiers : 05:05 05:25 05:45 06:05 06:25 06:39 puis toutes 12min
  const car_roma_departs = [
    "05:05","05:25","05:45","06:05","06:25","06:39",
  ];
  let t2 = toMin("06:51");
  while (t2 <= toMin("21:27")) { car_roma_departs.push(minToStr(t2)); t2 += 12; }

  car_roma_departs.forEach(dep => {
    // Arrivée P.le Roma = +18min depuis Ca'Rezzonico
    L1_CAR_ROMA.push({ dep: toMin(dep), arr: toMin(dep)+18, line: 1 });
  });

  // Accademia vers Roma = Ca'Rezzonico - 3min
  car_roma_departs.forEach(dep => {
    L1_ACC_ROMA.push({ dep: toMin(dep)-3, arr: toMin(dep)+15, line: 1 });
  });
})();

// ─── LIGNE 2 — Accademia uniquement ──────────────────
// PDF Ligne 2 (services tiers 2021) :
// → Lido : P.le Roma départ :06 :36 → Accademia :34 :04 → Lido SME :58 :28
// → Roma : Lido SME départ :00 :30 → Accademia :24 :54 → P.le Roma :52 :22

const L2_ACC_LIDO = [];
const L2_ACC_ROMA = [];

(function() {
  // Ligne 2 vers Lido : Accademia aux minutes :34 et :04 (toutes les 30min)
  // Service de 08:34 à 18:58 environ
  let t = toMin("08:34");
  while (t <= toMin("18:58")) {
    L2_ACC_LIDO.push({ dep: t, arr: t + 24, line: 2 }); // +24min → Lido SME
    t += 30;
  }

  // Ligne 2 vers Roma : Accademia aux minutes :24 et :54
  let t2 = toMin("09:24");
  while (t2 <= toMin("19:24")) {
    L2_ACC_ROMA.push({ dep: t2, arr: t2 + 28, line: 2 }); // +28min → P.le Roma
    t2 += 30;
  }
})();

// ═══════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════

let stopMode = 'rezzonico';
let dirMode  = 'lido';

function setStop(s) {
  stopMode = s;
  document.querySelectorAll('.stop-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + s).classList.add('active');
  render();
}
function setDir(d) {
  dirMode = d;
  document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + d).classList.add('active');
  render();
}

// ═══════════════════════════════════════════════════
// LOGIQUE
// ═══════════════════════════════════════════════════

function getNext(schedules, nowMin, count) {
  const results = schedules.map(e => {
    let diff = e.dep - nowMin;
    if (diff < 0) diff += 1440;
    return { ...e, diff };
  });
  results.sort((a,b) => a.diff - b.diff);
  return results.slice(0, count);
}

function mergeSort(...arrays) {
  return arrays.flat().sort((a,b) => a.diff - b.diff);
}

// ═══════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════

function render() {
  const nowMin = getNowMin();

  // Subtitle
  const stopLabel = stopMode === 'rezzonico' ? "Ca' Rezzonico" : "Accademia";
  const dirLabel  = dirMode === 'lido' ? '→ Lido S.M.E.' : '→ P.le Roma';
  document.getElementById('header-subtitle').textContent = `${stopLabel} ${dirLabel}`;

  // Légende
  const legendBox = document.getElementById('legend-box');
  if (stopMode === 'rezzonico') {
    legendBox.innerHTML = `<div class="legend-item"><div class="legend-dot" style="background:var(--l1)"></div>Ligne 1 uniquement à Ca' Rezzonico</div>`;
  } else {
    legendBox.innerHTML = `
      <div class="legend-item"><div class="legend-dot" style="background:var(--l1)"></div>Ligne 1 · Grand Canal complet</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--l2)"></div>Ligne 2 · Via S.Marco (plus rapide)</div>`;
  }

  // Sélection des horaires
  let schedules = [];
  if (stopMode === 'rezzonico') {
    schedules = dirMode === 'lido' ? L1_CAR_LIDO : L1_CAR_ROMA;
  } else {
    const l1 = dirMode === 'lido' ? L1_ACC_LIDO : L1_ACC_ROMA;
    const l2 = dirMode === 'lido' ? L2_ACC_LIDO : L2_ACC_ROMA;
    schedules = [...l1, ...l2];
  }

  const n1 = getNext(schedules.filter(e=>e.line===1), nowMin, 3);
  const n2 = getNext(schedules.filter(e=>e.line===2), nowMin, 3);
  const top3 = mergeSort(...(stopMode==='accademia'?[n1,n2]:[n1])).slice(0,3);

  const container = document.getElementById('departures-container');
  if (!top3.length) {
    container.innerHTML = `<div class="no-service"><div class="icon">🌙</div>Pas de service pour le moment</div>`;
    return;
  }

  const dirChipClass = dirMode === 'lido' ? 'lido' : 'roma';
  const dirChipLabel = dirMode === 'lido' ? '🟢 Lido S.M.E.' : '🟣 P.le Roma';
  const arrLabel     = dirMode === 'lido' ? 'Lido SME' : 'P.le Roma';

  let html = `<div class="section-label">Prochains départs — ${stopLabel}</div><div class="departures">`;

  top3.forEach((trip, i) => {
    const isNext = i === 0;
    const lineClass = trip.line === 1 ? 'l1' : 'l2';
    const depStr = minToStr(trip.dep);
    const arrStr = minToStr(trip.arr);

    let countdownHtml;
    if (isNext) {
      countdownHtml = `<div class="countdown-big" id="countdown-next"></div>`;
      window._nextDepMin = trip.dep;
    } else {
      const m = trip.diff;
      let txt='', cls='countdown';
      if (m<=5){txt=`dans ${m} min`;cls='countdown imminent';}
      else if (m<60){txt=`dans ${m} min`;}
      else{const h=Math.floor(m/60),mn=m%60;txt=mn>0?`dans ${h}h${String(mn).padStart(2,'0')}`:`dans ${h}h`;}
      countdownHtml = `<div class="${cls}">${txt}</div>`;
    }

    const routeInfo = trip.line === 1
      ? 'Ligne 1 · Grand Canal'
      : 'Ligne 2 · Via S.Marco';

    html += `
    <div class="card ${lineClass}${isNext?' next':''}">
      ${isNext?'<div class="next-tag">PROCHAIN</div>':''}
      <div class="badge">L${trip.line}</div>
      <div class="card-middle">
        <div class="depart-time">${depStr}</div>
        <div class="dest-chip ${dirChipClass}">${dirChipLabel}</div>
        <div class="route-info">${routeInfo} · arr. ${arrStr}</div>
      </div>
      <div class="card-right">
        ${countdownHtml}
      </div>
    </div>`;
  });

  html += '</div>';
  html += `<div class="info-box">
    <strong>⚓ ${stopLabel}</strong> ${dirLabel}<br>
    Arrivée <strong>${arrLabel}</strong>
  </div>`;

  container.innerHTML = html;
}

// ═══════════════════════════════════════════════════
// HORLOGE & COUNTDOWN
// ═══════════════════════════════════════════════════

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  document.getElementById('dateLabel').textContent = getJourLabel();
}

function updateCountdown() {
  const el = document.getElementById('countdown-next');
  if (!el || window._nextDepMin === undefined) return;
  const n = new Date();
  const nowSec = n.getHours()*3600 + n.getMinutes()*60 + n.getSeconds();
  let diff = window._nextDepMin*60 - nowSec;
  if (diff < 0) diff += 86400;
  if (diff > 7200) { render(); return; }
  if (diff <= 0) { el.textContent='En route !'; el.className='countdown-big imminent'; setTimeout(render,5000); return; }
  const mm=Math.floor(diff/60), ss=diff%60;
  let txt, cls='countdown-big';
  if (diff<60)      {txt=`${ss}s`;cls+=' imminent';}
  else if(diff<300) {txt=`${mm}m ${String(ss).padStart(2,'0')}s`;cls+=' imminent';}
  else              {txt=`${mm}m ${String(ss).padStart(2,'0')}s`;}
  el.textContent=txt; el.className=cls;
}

updateClock(); render(); updateCountdown();
setInterval(()=>{updateClock();updateCountdown();},1000);
setInterval(render,30000);
</script>
</body>
</html>
